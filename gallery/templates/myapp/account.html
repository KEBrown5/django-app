{% load static %}
<!DOCTYPE html>
<html lang = 'en'>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Account</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!--Bootstrap-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        
        <link rel="stylesheet"  href="{% static 'css/blog.css' %}">
    </head>
    <body>
        <!-- I used AI to create a fancy looking account page -->

        <!-- NAVBAR -->
        <nav class="site-nav navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="nav-brand navbar-brand" href="{% url 'blogsite:home' %}">The Blog</a>
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:create' %}">Create</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{% url 'blogsite:account' %}">Account</a></li>
                </ul>
            </div>
        </nav>

        <!-- MAIN -->
        <main class="container py-5">
            {% csrf_token %}

            <!-- Page header -->
            <header class="d-flex align-items-baseline gap-3 mb-4 pb-3 border-bottom">
                <h1 class="page-title mb-0">Your Account</h1>
            </header>

            <!-- Account card -->
            <div class="account-card card border-0">

                <!-- Identity strip -->
                <div class="account-identity d-flex align-items-center gap-3 p-4">
                    <div class="avatar">{{ request.user.username|first|upper }}</div>
                    <div class="d-flex flex-column gap-1">
                        <span class="identity-label">Logged in as</span>
                        <span class="identity-username">{{ request.user.username }}</span>
                    </div>
                </div>

                <hr class="m-0" style="border-color: var(--rule);">

                <!-- Action buttons -->
                <div class="d-flex flex-column flex-md-row gap-3 p-4">

                    <a class="action-btn edit d-flex align-items-center gap-3 p-3 flex-fill" href="{% url 'users:edit_profile' %}">
                        <div>
                            <div class="fw-medium">Edit Profile</div>
                            <div class="btn-sublabel">Update your details</div>
                        </div>
                    </a>

                    <a class="action-btn pwd d-flex align-items-center gap-3 p-3 flex-fill" href="{% url 'users:change_password' %}">
                        <div>
                            <div class="fw-medium">Change Password</div>
                            <div class="btn-sublabel">Keep your account secure</div>
                        </div>
                    </a>

                    <a class="action-btn logout d-flex align-items-center gap-3 p-3 flex-fill" href="{% url 'users:logout' %}">
                        <div>
                            <div class="fw-medium">Log Out</div>
                            <div class="btn-sublabel">End your session</div>
                        </div>
                    </a>

                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
