{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blog Website</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!--Bootstrap-->
        <link rel="stylesheet"  href="{% static 'css/blog.css' %}">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    </head>
    <body>  
        <!-- NAVBAR -->
        <nav class="site-nav navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="nav-brand navbar-brand" href="{% url 'blogsite:home' %}">The Blog</a>               
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link active" href="{% url 'blogsite:home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:create' %}">Create</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:account' %}">Account</a></li>
                </ul>               
            </div>
        </nav>
        
        <main class="container py-5">
            {% csrf_token %}
            <!-- Header -->
            <header class = "mb-3">
                <h1 class="page-title mb-0">Today's New Blogs</h1>
            </header>

            <form method="GET" action="{% url 'blogsite:home' %}" class="mb-4">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <div class="input-group">
                            <select name="tag" class="form-select">
                                <option value="">All Tags</option>
                                {% for tag in tags %}
                                    <option value="{{ tag.name }}" {% if tag.name == selected_tag %}selected{% endif %}>
                                        {{ tag.name }}
                                    </option>
                                {% endfor %}
                            </select>
                            <button type="submit" class="btn btn-outline-primary">Sort</button>
                        </div>
                    </div>
                </div>
            </form>

            <!-- Masonry here allows the cards to sit flush with one another -->
            <div class="row" data-masonry='{"percentPosition": true }'>
                {% for post in posts %}
                    <div class="col-md-4 mb-4">
                        <div class="card">
                            <a href="{% url 'blogsite:posts_detail' post.pk %}">
                                <img src="{{ post.image.url }}" alt="{{ post.created_name }}" class="card-img-top">
                            </a>
                            <div class="card-body">
                                <h5 class="card-title">{{ post.title }}</h5>
                                <p class="card-text">{{ post.short_description }}</p>
                                <a href="{% url 'blogsite:edit_posts' post.pk %}">Edit</a>
                                <a href="{% url 'blogsite:delete_posts' post.pk %}">Delete</a> <br>
                                <small class="card-text">Created at: {{ post.created_at }}</small> <br>
                                <small class="card-text">Updated at: {{ post.updated_at }}</small>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js"></script> 
    </body>
</html>
