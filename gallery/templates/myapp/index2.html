{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ posts.title }} - Blog Detail</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!--Bootstrap-->
        <link rel="stylesheet"  href="{% static 'css/blog.css' %}">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    </head>
    <body>  
        <!-- NAVBAR -->
        <nav class="site-nav navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="nav-brand navbar-brand" href="{% url 'blogsite:home' %}">The Blog</a>               
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link active" href="{% url 'blogsite:home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:create' %}">Create</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:account' %}">Account</a></li>
                </ul>               
            </div>
        </nav>
        
        <main class="container py-5">
            {% csrf_token %}
            <!-- Header -->
            <header class = "mb-3">
                <h1 class="page-title mb-0">{{ posts.title }} - Blog</h1>
            </header>

            <div class="row">
                <div class = "py-5">
                    <img src="{{ posts.image.url }}" alt="{{ posts.title }}" width = "500">
                </div>

                <p style = 'font-size: 20px;'>{{ posts.content }}</p>
                <a href="{% url 'blogsite:edit_posts' posts.pk %}">Edit</a>
                <a href="{% url 'blogsite:delete_posts' posts.pk %}">Delete</a> <br>

                <a href="{% url 'blogsite:home' %}">Back to Blogs Home Page</a>
            </div>
        </main>
    </body>
</html>
