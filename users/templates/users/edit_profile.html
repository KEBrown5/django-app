{% load static %}

<!DOCTYPE html>
<html lang = 'en'>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!--Bootstrap-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet"  href="{% static 'css/blog.css' %}">       
    </head>

    <body>
        <nav class="site-nav navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="nav-brand navbar-brand" href="{% url 'blogsite:home' %}">The Blog</a>               
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:create' %}">Create</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogsite:about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{% url 'blogsite:account' %}">Account</a></li>
                </ul>               
            </div>
        </nav>

        <div class = "card edit-card border-0">
            <div class = "p-4 edit-card-title">
                <h2 style = "color: var(--paper);">Edit Profile</h2>
            </div>

            <div class = "p-4">
                <form method="post" action = "">
                    {% csrf_token %}

                    <h4>{{form.username.label}}</h4>
                        {{form.username}}

                    <h4>{{form.email.label}}</h4>
                        {{form.email}}

                    <button class = "mb-2" type="submit">Save Changes</button>
                    <a href="{% url 'blogsite:account' %}">Cancel</a>
                </form>
            </div>
        </div>
    </body>
</html>
