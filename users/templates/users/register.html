{% load static %} <!-- Imports files from the static folder-->
<!DOCTYPE html>
<html lang = 'en'>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
        <link rel="stylesheet"  href="{% static 'css/register.css' %}">
    </head>
    <body>
        <div class="register-page">
            <div class="form">
                <form class="register-form" method="POST" action="">
                    {% csrf_token %} <!-- csrf token is used for security reasons -->
                    <h2 class="register-title">REGISTER</h3>
                    <h4>{{form.username.label}}</h4>
                    {{form.username}}
                    <h4>{{form.email.label}}</h4>
                    {{form.email}}
                    <h4>{{form.password1.label}}</h4>
                    {{form.password1}}
                    <h4>{{form.password2.label}}</h4>
                    {{form.password2}}
                    <button type="submit"> Create </button>
                    <p class="message">Already registered? <a href="{% url 'users:login' %}">Log In</a></p>
                </form>
                {{ form.errors }} <!-- Shows users if theres errors with the fields in the form -->
            </div>
        </div>
    </body>
</html>
